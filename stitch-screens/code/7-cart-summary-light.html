<!-- TopAppBar -->

</button>

</header>

</div>

</button>
<span class="font-body-md text-body-md font-semibold w-4 text-center">2</span>
<button class="w-6 h-6 flex items-center justify-center rounded-full text-[#1E1E1E] hover:bg-[#C19E6E]/20 transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
<p class="font-body-md text-body-md font-bold text-[#1E1E1E]">₹300</p>

<div class="flex flex-col items-center gap-2">

<div class="flex flex-col items-center gap-2">

</button>

<button class="w-6 h-6 flex items-center justify-center rounded-full text-[#1E1E1E] hover:bg-[#C19E6E]/20 transition-colors">
